name: Build ChemoChat Debug APK

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # Install SDK Tools
      - name: Setup Android SDK Tools
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: 12.0
          accept-android-sdk-licenses: true
          log-accepted-android-sdk-licenses: false

      # Install Platform Tools
      - name: Install Platform Tools
        uses: android-actions/setup-android@v3
        with:
          packages: platform-tools
          accept-android-sdk-licenses: true
          log-accepted-android-sdk-licenses: false

      # Install Build Tools 34.0.0
      - name: Install Build Tools 34.0.0
        uses: android-actions/setup-android@v3
        with:
          packages: build-tools;34.0.0
          accept-android-sdk-licenses: true
          log-accepted-android-sdk-licenses: false

      # Install Android Platform 34
      - name: Install Android Platform 34
        uses: android-actions/setup-android@v3
        with:
          packages: platforms;android-34
          accept-android-sdk-licenses: true
          log-accepted-android-sdk-licenses: false

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ChemoChat-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk