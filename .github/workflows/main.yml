name: Build ChemoChat Debug APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. Checkout your code
    - name: Checkout repository
      uses: actions/checkout@v4

    # 2. Set up Java 17
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: 17

    # 3. Cache Gradle dependencies for faster builds
    - name: Cache Gradle packages
      uses: actions/cache@v3
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          gradle-

    # 4. Setup Android SDK with proper packages
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      with:
        cmdline-tools-version: 12.0
        accept-android-sdk-licenses: true
        log-accepted-android-sdk-licenses: true
        packages: "platform-tools platforms;android-34 build-tools;latest"

    # 5. Make gradlew executable
    - name: Make gradlew executable
      run: chmod +x ./gradlew

    # 6. Build Debug APK (with retries for reliability)
    - name: Build Debug APK
      run: |
        max_attempts=3
        attempt_num=1
        until [ $attempt_num -gt $max_attempts ]
        do
          echo "Attempt $attempt_num to build APK..."
          if ./gradlew assembleDebug \
              -Pandroid.useAndroidX=true \
              -PkotlinVersion=1.9.0 \
              -PcomposeCompilerVersion=1.5.1 \
              --stacktrace
          then
            echo "Gradle build succeeded."
            break
          else
            echo "Gradle build failed. Retrying..."
            attempt_num=$((attempt_num+1))
            sleep 10
          fi
        done
      shell: bash

    # 7. Upload the APK artifact
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: ChemoChat-debug-apk
        path: app/build/outputs/apk/debug/app-debug.apk
